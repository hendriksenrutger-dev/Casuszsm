<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Casustraining OM</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#082D6B">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Casustraining">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #C8D0DC;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    #shell {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100vh;
      background: #EEF1F6;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    #header {
      background: #082D6B;
      padding: 14px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-rij {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-rij.met-balk { margin-bottom: 10px; }
    .header-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }
    .header-badge {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,0.15);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .voortgang-balk {
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      overflow: hidden;
    }
    .voortgang-vulling {
      height: 100%;
      background: #C8102E;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── CONTENT ── */
    #content { padding: 24px 20px 40px; flex: 1; }

    /* ── TYPOGRAFIE ── */
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      color: #C8102E;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .scherm-titel {
      font-size: 20px;
      font-weight: 700;
      color: #1A2333;
      margin-bottom: 20px;
      line-height: 1.3;
    }
    .body-tekst {
      font-size: 14px;
      color: #1A2333;
      line-height: 1.7;
    }
    .gedempt { color: #5E6B7E; }

    /* ── KAARTEN ── */
    .kaart {
      background: #fff;
      border: 1px solid #D8E0EC;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .kaart-blauw {
      background: #EBF0FB;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .kaart-geel {
      background: #FFF8EC;
      border: 1px solid #F5D78B;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    /* ── KNOPPEN ── */
    .knop {
      display: block;
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      -webkit-appearance: none;
      font-family: inherit;
    }
    .knop-primary { background: #082D6B; color: #fff; }
    .knop-rood    { background: #C8102E; color: #fff; }
    .knop-ghost   {
      background: transparent;
      border: 1px solid #D8E0EC;
      color: #5E6B7E;
      font-weight: 400;
    }
    .knop:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── VERBAAL SELECTIE ── */
    .verbaal-optie {
      display: block;
      width: 100%;
      padding: 13px 16px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: 2px solid #D8E0EC;
      background: #fff;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      color: #1A2333;
      font-family: inherit;
      -webkit-appearance: none;
    }
    .verbaal-optie.geselecteerd {
      border-color: #082D6B;
      background: #EBF0FB;
      font-weight: 700;
    }

    /* ── SITUATIE ITEMS ── */
    .situatie-item {
      display: flex;
      gap: 12px;
      background: #fff;
      border: 1px solid #D8E0EC;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .situatie-icoon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

    /* ── DOCUMENT (verbaal) ── */
    .document {
      background: #FDFCF8;
      border: 1px solid #C8BFAF;
      border-radius: 4px;
      padding: 20px 18px;
      margin-bottom: 16px;
      max-height: 420px;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08), 2px 2px 0 #E0D9CE;
      -webkit-overflow-scrolling: touch;
    }
    .document-mini {
      background: #FDFCF8;
      border: 1px solid #C8BFAF;
      border-radius: 4px;
      padding: 14px;
      margin-bottom: 20px;
      max-height: 240px;
      overflow-y: auto;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      -webkit-overflow-scrolling: touch;
    }
    .doc-hoofd {
      text-align: center;
      border-bottom: 1px solid #C8BFAF;
      padding-bottom: 14px;
      margin-bottom: 18px;
    }
    .doc-titel {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #1A2333;
      margin-bottom: 3px;
    }
    .doc-subtitel { font-size: 11px; color: #5E6B7E; }
    .doc-sectie { margin-bottom: 18px; }
    .doc-kop {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #082D6B;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .doc-tekst {
      font-size: 13px;
      color: #1A2333;
      line-height: 1.75;
      font-family: Georgia, 'Times New Roman', serif;
      margin-bottom: 8px;
    }

    /* ── VERBAAL TOGGLE KNOP ── */
    .verbaal-toggle {
      border: 1px solid #D8E0EC;
      border-radius: 8px;
      background: #fff;
      padding: 6px 10px;
      font-size: 12px;
      color: #082D6B;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      font-family: inherit;
      flex-shrink: 0;
    }

    /* ── VRAGEN ── */
    .blok-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 20px;
    }
    .vraag-blok { margin-bottom: 28px; }
    .vraag-tekst {
      font-size: 15px;
      font-weight: 600;
      color: #1A2333;
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .optie-knop {
      display: block;
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: 2px solid #D8E0EC;
      background: #fff;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.5;
      color: #1A2333;
      font-family: inherit;
      -webkit-appearance: none;
    }
    .optie-knop.geselecteerd {
      border-color: #082D6B;
      background: #EBF0FB;
      font-weight: 600;
    }

    /* ── UITKOMST ── */
    .uitkomst-header {
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    .verdict-icoon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      font-weight: 700;
    }
    .verdict-label {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .gevolg-kaart {
      background: #fff;
      border: 1px solid #D8E0EC;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .gevolg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .gevolg-label { font-size: 14px; font-weight: 700; color: #1A2333; }
    .nabespreking {
      background: #EBF0FB;
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
      margin-bottom: 24px;
      text-align: center;
    }
  </style>
</head>

<div id="shell">
  <div id="header"></div>

    achtergrond: '#FDEEF0',
    icoon: '✗',
    om: 'De aanhouding is niet rechtmatig onderbouwd. Geen juridische grond vermeld. Alles wat daarna is gevonden — de tas, het bewijs — is onrechtmatig verkregen en niet bruikbaar. De officier seponeert.',
    slachtoffer: 'De straatroof is feitelijk bewezen maar strafrechtelijk niet vervolgbaar. Geen gerechtigheid. Geen schadevergoeding. Niet omdat de zaak niet klopte — maar omdat het verbaal niet klopte.',
    verdachte: 'De verdachte gaat vrijuit. Niet omdat hij onschuldig is. Geen veroordeling, geen jeugdhulpverlening, geen begeleiding. Een gemiste kans door een onrechtmatige aanhouding.',
  },
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

let staat = {
  stap: 0,
  verbaalSleutel: null,
  antwoorden: {},
  verbaalOpen: false,
};

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function verbaalSectiesHTML(secties) {
  return secties.map(s => `
    <div class="doc-sectie">
      <div class="doc-kop">${s.kop}</div>
      ${s.tekst.split('\n\n').map(p => `<div class="doc-tekst">${p}</div>`).join('')}
    </div>
  `).join('');
}

function alleBeantwoord(blokIndex) {
  return BLOKKEN[blokIndex].vragen.every(v => staat.antwoorden[v.id] !== undefined);
}

// ═══════════════════════════════════════════════════════════════
// SCHERMEN
// ═══════════════════════════════════════════════════════════════

function schermIntro() {
  return `
    <div style="text-align:center;padding:8px 0 24px">
      <div style="width:72px;height:72px;border-radius:18px;background:#082D6B;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:34px">⚖️</div>
      <h1 style="font-size:22px;font-weight:700;color:#1A2333;margin:0 0 6px">Verbaal beoordelen</h1>
      <p class="gedempt" style="font-size:14px">Casustraining · Straatroof</p>
    </div>

    <div class="kaart" style="margin-bottom:12px">
      <p class="body-tekst" style="margin-bottom:10px">Je bent rechercheur in opleiding. Je ontvangt een proces-verbaal over een straatroof.</p>
      <p class="body-tekst">Jouw taak: lees het verbaal, herken wat goed en fout is, en adviseer de officier van justitie.</p>
    </div>

    <div class="kaart-geel">
      <p style="font-size:13px;color:#6B4400;line-height:1.6;margin:0"><strong>Let op:</strong> maak geen aannames. Vul niets in dat er niet staat. Alleen wat bewijsbaar en waarneembaar is telt.</p>
    </div>

    <p style="font-size:11px;font-weight:700;color:#5E6B7E;letter-spacing:0.08em;text-transform:uppercase;margin:0 0 10px">Demonstratie — kies een verbaal</p>

    ${['A','B','C'].map(v => `
      <button class="verbaal-optie${staat.verbaalSleutel === v ? ' geselecteerd' : ''}" onclick="kiesVerbaal('${v}')">
        ${staat.verbaalSleutel === v ? '● Verbaal ' + v + ' geselecteerd' : '○ Verbaal ' + v}
      </button>
    `).join('')}

    <div style="margin-top:20px">
      <button class="knop knop-primary" onclick="volgende()" ${!staat.verbaalSleutel ? 'disabled' : ''}>Start →</button>
    </div>
  `;
}

function schermSituatie() {
  const items = [
    { icoon: '🕘', tekst: 'Zaterdagavond, 21:45 uur, Centrum Den Haag.' },
    { icoon: '👜', tekst: 'Slachtoffer: vrouw, 52 jaar, loopt alleen naar haar auto. Een jongen pakt haar schoudertas en rent weg. Zij valt en stoot haar rechterknie. In de tas: portemonnee (€80 contant), bankpas, iPhone 13 zwart.' },
    { icoon: '👁', tekst: 'Getuige ziet jongen wegrennen. Signalement: rode hoodie, donkere broek, geschat 15–17 jaar.' },
    { icoon: '🚔', tekst: 'Collega houdt 300 meter verderop een jongen aan die voldoet aan het signalement. De jongen verzet zich actief. Er ontstaat een worsteling. De agent raakt gewond — geschaafde hand, gescheurde mouw. Verdachte wordt geboeid. De tas wordt bij hem aangetroffen. Verdachte is 16 jaar.' },
  ];
  return `
    <p class="eyebrow">Het incident</p>
    <h2 class="scherm-titel">Wat is er gebeurd?</h2>
    ${items.map(i => `
      <div class="situatie-item">
        <span class="situatie-icoon">${i.icoon}</span>
        <p class="body-tekst">${i.tekst}</p>
      </div>
    `).join('')}
    <div class="kaart-blauw" style="margin-top:4px;margin-bottom:24px">
      <p style="font-size:13px;color:#082D6B;line-height:1.6;margin:0"><strong>Jouw rol:</strong> Je leest het verbaal dat de agent heeft opgemaakt. Beoordeel wat er staat en wat er ontbreekt of onjuist is.</p>
    </div>
    <button class="knop knop-primary" onclick="volgende()">Lees het verbaal →</button>
    <button class="knop knop-ghost" onclick="vorige()">← Terug</button>
  `;
}

function schermVerbaal() {
  const secties = VERBALEN[staat.verbaalSleutel] || [];
  return `
    <p class="eyebrow">Verbaal ${staat.verbaalSleutel}</p>
    <h2 class="scherm-titel" style="margin-bottom:4px">Proces-verbaal</h2>
    <p class="gedempt" style="font-size:13px;margin-bottom:16px">Lees zorgvuldig. Maak geen aannames.</p>

    <div class="document">
      <div class="doc-hoofd">
        <div class="doc-titel">PROCES-VERBAAL VAN BEVINDINGEN EN AANHOUDING</div>
        <div class="doc-subtitel">Politie · Eenheid Den Haag</div>
      </div>
      ${verbaalSectiesHTML(secties)}
    </div>

    <button class="knop knop-rood" onclick="volgende()">Begin beoordeling →</button>
    <button class="knop knop-ghost" onclick="vorige()">← Terug</button>
  `;
}

function schermBlok(blokIndex) {
  const blok = BLOKKEN[blokIndex];
  const isLaatste = blokIndex === BLOKKEN.length - 1;
  const secties = VERBALEN[staat.verbaalSleutel] || [];
  const klaar = alleBeantwoord(blokIndex);

  return `
    <div class="blok-header">
      <div>
        <p class="eyebrow" style="margin-bottom:4px">${blok.titel}</p>
        <h2 style="font-size:18px;font-weight:700;color:#1A2333;margin:0">Beoordeel het verbaal</h2>
      </div>
      <button class="verbaal-toggle" onclick="toggleVerbaal()">📄 Verbaal</button>
    </div>

    ${staat.verbaalOpen ? `
      <div class="document-mini">
        ${verbaalSectiesHTML(secties)}
      </div>
    ` : ''}

    ${blok.vragen.map(v => `
      <div class="vraag-blok">
        <p class="vraag-tekst">${v.id}. ${v.tekst}</p>
        ${v.opties.map((opt, idx) => `
          <button class="optie-knop${staat.antwoorden[v.id] === idx ? ' geselecteerd' : ''}" onclick="kiesAntwoord(${v.id}, ${idx})">
            <span style="margin-right:8px;color:${staat.antwoorden[v.id] === idx ? '#082D6B' : '#5E6B7E'}">${staat.antwoorden[v.id] === idx ? '●' : '○'}</span>${opt}
          </button>
        `).join('')}
      </div>
    `).join('')}

    <button class="knop knop-primary" onclick="volgende()" ${!klaar ? 'disabled' : ''}>
      ${isLaatste ? 'Bekijk uitkomst →' : 'Volgende →'}
    </button>
    <button class="knop knop-ghost" onclick="vorige()">← Terug</button>
  `;
}

function schermUitkomst() {
  const u = UITKOMSTEN[staat.verbaalSleutel];
  return `
    <div class="uitkomst-header" style="background:${u.achtergrond};border:1px solid ${u.kleur}30">
      <div class="verdict-icoon" style="background:${u.kleur}">${u.icoon}</div>
      <div class="verdict-label" style="color:${u.kleur}">${u.label}</div>
      <p class="gedempt" style="font-size:13px;margin-top:4px">Dit was verbaal ${staat.verbaalSleutel}</p>
    </div>

    ${[
      { icoon: '⚖️', label: 'Het OM',                  tekst: u.om },
      { icoon: '👩', label: 'Het slachtoffer',          tekst: u.slachtoffer },
      { icoon: '👦', label: 'De jeugdige verdachte',   tekst: u.verdachte },
    ].map(g => `
      <div class="gevolg-kaart">
        <div class="gevolg-header">
          <span style="font-size:18px">${g.icoon}</span>
          <span class="gevolg-label">${g.label}</span>
        </div>
        <p class="body-tekst">${g.tekst}</p>
      </div>
    `).join('')}

    <div class="nabespreking">
      <p style="font-size:14px;font-weight:600;color:#082D6B;margin:0 0 6px">Nabespreking</p>
      <p style="font-size:13px;color:#082D6B;line-height:1.6;margin:0">Vergelijk je uitkomst met die van je medestudenten. Wie had welk verbaal? Welke fouten zijn gevonden? Wat had anders gemoeten?</p>
    </div>

    <button class="knop knop-ghost" onclick="reset()">Opnieuw beginnen</button>
  `;
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  const TOTAAL = 7;
  const { stap, verbaalSleutel } = staat;
  const voortgang = stap === 0 ? 0 : Math.round((stap / TOTAAL) * 100);

  // Header
  document.getElementById('header').innerHTML = `
    <div class="header-rij${stap > 0 ? ' met-balk' : ''}">
      <span class="header-label">ZSM Amsterdam</span>
      ${verbaalSleutel && stap > 0 ? `<span class="header-badge">Verbaal ${verbaalSleutel}</span>` : ''}
    </div>
    ${stap > 0 ? `<div class="voortgang-balk"><div class="voortgang-vulling" style="width:${voortgang}%"></div></div>` : ''}
  `;

  // Content
  const schermen = {
    0: schermIntro,
    1: schermSituatie,
    2: schermVerbaal,
    3: () => schermBlok(0),
    4: () => schermBlok(1),
    5: () => schermBlok(2),
    6: () => schermBlok(3),
    7: schermUitkomst,
  };

  document.getElementById('content').innerHTML = (schermen[stap] || (() => ''))();
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════════════════════════
// ACTIES
// ═══════════════════════════════════════════════════════════════

function volgende()          { staat.verbaalOpen = false; staat.stap = Math.min(7, staat.stap + 1); render(); }
function vorige()            { staat.verbaalOpen = false; staat.stap = Math.max(0, staat.stap - 1); render(); }
function kiesVerbaal(v)      { staat.verbaalSleutel = v; render(); }
function kiesAntwoord(id, i) { staat.antwoorden[id] = i; render(); }
function toggleVerbaal()     { staat.verbaalOpen = !staat.verbaalOpen; render(); }
function reset()             { staat = { stap: 0, verbaalSleutel: null, antwoorden: {}, verbaalOpen: false }; render(); }

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
  });
}
</script>
</body>
</html>
